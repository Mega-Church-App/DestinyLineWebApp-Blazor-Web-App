name: Deploy to Vercel
on:
  push:
    branches: [main] # Triggered every time you push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish Client Project
        # This compiles your C# into static WebAssembly files
        run: dotnet publish DestinyLineWebApp/DestinyLineWebApp.Client/DestinyLineWebApp.Client.csproj -c Release -o release

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          working-directory: ./release/wwwroot
          vercel-args: '--prod'